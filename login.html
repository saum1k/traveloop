<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Traveloop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%); min-height:100vh; display:flex; flex-direction:column;">

<!-- NAVBAR -->
<nav class="navbar" style="position:relative;">
  <a href="index.html" class="nav-logo">Travel<span>oop</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="explore.html">Explore</a></li>
    <li><a href="login.html" class="btn-login" id="login-btn">Login</a></li>
  </ul>
  <div class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </div>
</nav>

<!-- LOGIN SECTION -->
<div style="flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem;">
  <div style="width:100%; max-width:460px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:2rem;">
      <div class="nav-logo" style="font-size:2.5rem; display:block; margin-bottom:0.3rem;">Travel<span style="color:white">oop</span></div>
      <p style="color:rgba(255,255,255,0.6); font-size:0.95rem;">Welcome back, adventurer!</p>
    </div>

    <div class="form-card">
      <div class="form-title">Sign In</div>
      <div class="form-sub">Access your bookings, itineraries and more</div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div style="position:relative;">
            <input type="password" id="login-pass" placeholder="Min. 6 characters" required autocomplete="current-password" style="padding-right:3rem;">
            <span onclick="togglePassword('login-pass', this)" style="position:absolute; right:1rem; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1rem; color:var(--text-light);">👁️</span>
          </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; font-size:0.88rem;">
          <label style="display:flex; align-items:center; gap:0.4rem; font-weight:400; cursor:pointer; color:var(--text);">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" style="color:var(--primary);">Forgot password?</a>
        </div>

        <div id="login-msg"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="border-radius:var(--radius-sm);">Sign In →</button>
      </form>

      <!-- Divider -->
      <div style="display:flex; align-items:center; gap:1rem; margin:1.5rem 0;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="color:var(--text-light); font-size:0.85rem;">or continue with</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>

      <!-- Social Login -->
      <div style="display:flex; gap:0.8rem;">
        <button onclick="socialLogin('Google')" style="flex:1; padding:0.7rem; border:2px solid var(--border); background:var(--white); border-radius:var(--radius-sm); cursor:pointer; font-size:0.9rem; font-weight:600; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:var(--transition);" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
          🌐 Google
        </button>
        <button onclick="socialLogin('Facebook')" style="flex:1; padding:0.7rem; border:2px solid var(--border); background:var(--white); border-radius:var(--radius-sm); cursor:pointer; font-size:0.9rem; font-weight:600; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:var(--transition);" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
          📘 Facebook
        </button>
      </div>

      <div class="form-link">
        Don't have an account? <a href="register.html">Sign up free →</a>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="script.js"></script>

<script>

function togglePassword(inputId, icon) {

const input = document.getElementById(inputId);

if (input.type === 'password') {

input.type = 'text';
icon.textContent = '🔒';

}
else {

input.type = 'password';
icon.textContent = '👁️';

}

}


function socialLogin(provider) {

alert(provider + " login coming soon!");

}



async function handleLogin(event){

event.preventDefault();


const email = document.getElementById("login-email").value;

const password = document.getElementById("login-pass").value;


try{

const response = await fetch("http://localhost:5000/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email,
password:password

})

});


const result = await response.json();


if(result.success){

alert("Login successful");


localStorage.setItem("user", JSON.stringify(result.user));


window.location.href="index.html";

}
else{

document.getElementById("login-msg").innerHTML = result.message;

}

}
catch(error){

console.log(error);

alert("Server error");

}

}

</script>
</body>
</html>
