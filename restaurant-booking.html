<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Booking – Traveloop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Travel<span>oop</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="explore.html">Explore</a></li>
    <!--<li><a href="hotels.html">Hotels</a></li>
    <li><a href="restaurants.html" class="active">Restaurants</a></li>
    <li><a href="rentals.html">Rentals</a></li>-->
    <li><a href="planner.html">Planner</a></li>
    <li><a href="travel-buddy.html">Travel Buddy</a></li>
    <li><a href="login.html" class="btn-login" id="login-btn">Login</a></li>
  </ul>
  <div class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="form-card">
      <div class="form-title">Restaurant Booking</div>
      <div class="form-sub">Confirm your table for:</div>
      <h2 id="restaurant-name" style="margin-bottom: 1.5rem;">Selected Restaurant</h2>

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="restaurant-date" required>
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="restaurant-time" required>
      </div>
      <div class="form-group">
        <label>Guests</label>
        <select id="restaurant-guests">
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5+</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" onclick="confirmRestaurantBooking()">Confirm Booking</button>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
